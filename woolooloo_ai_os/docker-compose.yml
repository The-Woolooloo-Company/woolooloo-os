version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5002:8000"
    environment:
      - DATABASE_URL=postgresql://woolooloo:woolooloo@postgres:5432/woolooloo_os
      - REDIS_URL=redis://redis:6379/0
      - VLLM_HOST=http://192.168.1.161:8000
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://woolooloo:woolooloo@postgres:5432/woolooloo_os
      - REDIS_URL=redis://redis:6379/0
      - VLLM_HOST=http://vllm:8000
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    command: celery -A src.workers.celery_app worker --loglevel=info

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://woolooloo:woolooloo@postgres:5432/woolooloo_os
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - .:/app
    command: celery -A src.workers.celery_app beat --loglevel=info

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=woolooloo
      - POSTGRES_PASSWORD=woolooloo
      - POSTGRES_DB=woolooloo_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  dashboard:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
